; PlatformIO Project Configuration
; ESP32-WROOM-32 WiFi Remote-Control Vehicle

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    ; Async web server (non-blocking, ideal for REST + UI)
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DASYNCWEBSERVER_REGEX=1

